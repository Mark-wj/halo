services:
  - type: web
    name: halo-backend
    runtime: python
    region: frankfurt  # closest to Kenya
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --threads 2 --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: FLASK_ENV
        value: production
      - key: LAZY_LOAD_MODELS
        value: "true"
    healthCheckPath: /health